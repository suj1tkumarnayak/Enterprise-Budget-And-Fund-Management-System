# =============================================================================
# EBFMS — Docker Compose
# Local development and CI environment.
# Production runs on Render (backend) + Vercel (frontend) + Neon (database).
# =============================================================================

version: '3.9'

services:

  # ── PostgreSQL 16 ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ebfms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ebfms_dev
      POSTGRES_PASSWORD: ebfms_dev
      POSTGRES_DB:       ebfms_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ['CMD-SHELL', 'pg_isready -U ebfms_dev -d ebfms_dev']
      interval: 10s
      timeout:  5s
      retries:  5

  # ── PostgreSQL (test DB — separate to never pollute dev data) ─────────────
  postgres_test:
    image: postgres:16-alpine
    container_name: ebfms_postgres_test
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ebfms_test
      POSTGRES_PASSWORD: ebfms_test
      POSTGRES_DB:       ebfms_test
    ports:
      - '5433:5432'
    healthcheck:
      test:     ['CMD-SHELL', 'pg_isready -U ebfms_test -d ebfms_test']
      interval: 10s
      timeout:  5s
      retries:  5

  # ── Redis (optional — rate limiting, session caching) ─────────────────────
  redis:
    image: redis:7-alpine
    container_name: ebfms_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test:     ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout:  5s
      retries:  5

  # ── Backend API ───────────────────────────────────────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
      target:     development
    container_name: ebfms_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://ebfms_dev:ebfms_dev@postgres:5432/ebfms_dev
      REDIS_URL:    redis://redis:6379
    ports:
      - '3000:3000'
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      # Prevent host node_modules from overwriting container node_modules
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Frontend (Vite dev server) ────────────────────────────────────────────
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
      target:     development
    container_name: ebfms_frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - '5173:5173'
    volumes:
      - ./frontend/src:/app/src
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
